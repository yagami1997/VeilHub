<svg xmlns="http://www.w3.org/2000/svg" width="1568" height="1512" viewBox="0 0 1568 1512" role="img" aria-labelledby="title desc">
  <title id="title">VeilHub reference interface screenshot</title>
  <desc id="desc">Reference interface for VeilHub showing the private owner workspace and link generation controls.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#2a3523" flood-opacity=".16"/>
    </filter>
    <style>
      .sans { font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .cream { fill: #f2e3ce; }
      .green { fill: #3c5633; }
      .ink { fill: #23301f; }
      .muted { fill: #66715f; }
      .field { fill: #fffaf4; stroke: #d7c9b5; stroke-width: 1; }
      .button-muted { fill: #e4dac5; stroke: #cfc1aa; stroke-width: 1; }
    </style>
  </defs>

  <rect width="1568" height="1512" fill="#fbf7ef"/>
  <rect width="1568" height="420" class="green"/>

  <g transform="translate(194 18)">
    <path d="M35 0 C58 37 67 92 35 130 C6 89 7 37 35 0 Z" fill="#fffaf0"/>
    <path d="M102 0 C76 38 66 94 34 130 C70 95 96 43 102 0 Z" fill="#fffaf0"/>
    <path d="M69 34 L67 111" stroke="#d67a0b" stroke-width="1.2"/>
    <text x="130" y="120" class="sans" fill="#fffaf0" font-size="118" font-weight="700">VeilHub</text>
  </g>

  <text x="162" y="262" class="sans cream" font-size="56" font-weight="650">Encrypted links that expire</text>
  <text x="162" y="317" class="sans" fill="#d6c9b7" font-size="29" font-weight="420">Share the path, hide the destination.</text>

  <g filter="url(#shadow)">
    <rect x="117" y="379" width="1311" height="964" rx="10" class="cream" stroke="#d7c9b5"/>
  </g>

  <text x="163" y="464" class="sans ink" font-size="40" font-weight="700">Generate Share Link</text>
  <text x="163" y="503" class="sans muted" font-size="23">Create a controlled encrypted redirect.</text>

  <g transform="translate(1085 425)">
    <rect width="188" height="44" rx="8" class="button-muted"/>
    <text x="94" y="29" text-anchor="middle" class="sans" fill="#6f705f" font-size="18" font-weight="700">Revoke Sessions</text>
  </g>
  <g transform="translate(1286 425)">
    <rect width="97" height="44" rx="8" class="button-muted"/>
    <text x="48.5" y="29" text-anchor="middle" class="sans" fill="#6f705f" font-size="18" font-weight="700">Logout</text>
  </g>

  <g transform="translate(163 549)">
    <rect width="1220" height="75" rx="7" class="field"/>
    <text x="24" y="48" class="sans" fill="#747474" font-size="29">Paste your URL here</text>
  </g>
  <g transform="translate(163 644)">
    <rect width="1220" height="75" rx="7" class="field"/>
    <text x="24" y="48" class="sans" fill="#747474" font-size="29">Optional custom ID. Leave blank for a private random token.</text>
  </g>
  <g transform="translate(163 739)">
    <rect width="1220" height="76" rx="7" class="field"/>
    <text x="30" y="49" class="sans ink" font-size="28" font-weight="650">3 Days</text>
    <path d="M1197 32 l8 8 l8 -8" fill="none" stroke="#23301f" stroke-width="2"/>
  </g>

  <g transform="translate(163 852)">
    <rect width="18" height="18" rx="2" fill="#fffaf4" stroke="#8d9594" stroke-width="1.5"/>
    <text x="34" y="18" class="sans" fill="#4e6049" font-size="24">Use ultra-short ID</text>
    <text x="0" y="63" class="sans muted" font-size="22">Ultra-short IDs are easier to share but less private. Leave it off for a private random token.</text>
  </g>
  <g transform="translate(163 950)">
    <rect width="18" height="18" rx="2" fill="#fffaf4" stroke="#8d9594" stroke-width="1.5"/>
    <text x="34" y="18" class="sans" fill="#4e6049" font-size="24">One-time link</text>
  </g>
  <g transform="translate(163 1005)">
    <rect x="-5" y="-7" width="29" height="29" fill="#eadfc9"/>
    <rect width="18" height="18" rx="2" fill="#fffaf4" stroke="#8d9594" stroke-width="1.5"/>
    <text x="34" y="18" class="sans" fill="#4e6049" font-size="24">Access code protection</text>
  </g>

  <g transform="translate(163 1065)">
    <rect width="1220" height="73" rx="7" fill="#3c5633"/>
    <text x="610" y="47" text-anchor="middle" class="sans" fill="#fffaf0" font-size="29" font-weight="750">Generate</text>
  </g>

  <text x="163" y="1182" class="sans muted" font-size="22">Send the share link and access code separately. The access code is not part of the URL.</text>
  <line x1="163" y1="1235" x2="1383" y2="1235" stroke="#d6c8b1"/>
  <text x="163" y="1292" class="sans ink" font-size="29" font-weight="750">Owner Security</text>
  <text x="385" y="1292" class="sans" fill="#d67a0b" font-size="29" font-weight="800">+</text>

  <line x1="117" y1="1396" x2="1428" y2="1396" stroke="#d6d0c3"/>
  <g transform="translate(612 1423)">
    <path d="M35 8 C27 -5 6 1 6 20 C-2 21 -6 35 9 38 L38 38 C52 38 54 20 39 17 C39 13 38 10 35 8 Z" fill="#d67a0b"/>
    <path d="M26 17 C31 8 48 10 50 24 C61 24 65 38 49 39 L23 39 C10 39 9 24 22 23 C22 21 23 19 26 17 Z" fill="#f2e3ce"/>
    <text x="61" y="31" class="sans" fill="#3c5633" font-size="23" font-weight="800">Cloudflare Workers + KV</text>
  </g>
  <text x="433" y="1490" class="sans muted" font-size="22">AES-GCM encryption</text>
  <text x="668" y="1490" class="sans muted" font-size="22">PBKDF2 access codes</text>
  <text x="915" y="1490" class="sans muted" font-size="22">TTL + one-time links</text>
</svg>
